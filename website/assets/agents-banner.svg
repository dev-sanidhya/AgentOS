<svg width="1400" height="220" viewBox="0 0 1400 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f0e3"/>
      <stop offset="50%" stop-color="#ece3cf"/>
      <stop offset="100%" stop-color="#e5d9c0"/>
    </linearGradient>
    <radialGradient id="glow-a" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-b" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-dots" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur-lines" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <rect width="1400" height="220" fill="url(#bg)"/>
  <rect width="1400" height="220" fill="url(#glow-a)"/>
  <rect width="1400" height="220" fill="url(#glow-b)"/>

  <!-- Subtle dot grid -->
  <g fill="#18181b" fill-opacity="0.06">
    <circle cx="40" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="200" cy="40" r="1.5"/>
    <circle cx="280" cy="40" r="1.5"/><circle cx="360" cy="40" r="1.5"/><circle cx="440" cy="40" r="1.5"/>
    <circle cx="520" cy="40" r="1.5"/><circle cx="600" cy="40" r="1.5"/><circle cx="680" cy="40" r="1.5"/>
    <circle cx="760" cy="40" r="1.5"/><circle cx="840" cy="40" r="1.5"/><circle cx="920" cy="40" r="1.5"/>
    <circle cx="1000" cy="40" r="1.5"/><circle cx="1080" cy="40" r="1.5"/><circle cx="1160" cy="40" r="1.5"/>
    <circle cx="1240" cy="40" r="1.5"/><circle cx="1320" cy="40" r="1.5"/>
    <circle cx="40" cy="110" r="1.5"/><circle cx="120" cy="110" r="1.5"/><circle cx="200" cy="110" r="1.5"/>
    <circle cx="280" cy="110" r="1.5"/><circle cx="360" cy="110" r="1.5"/><circle cx="440" cy="110" r="1.5"/>
    <circle cx="520" cy="110" r="1.5"/><circle cx="600" cy="110" r="1.5"/><circle cx="680" cy="110" r="1.5"/>
    <circle cx="760" cy="110" r="1.5"/><circle cx="840" cy="110" r="1.5"/><circle cx="920" cy="110" r="1.5"/>
    <circle cx="1000" cy="110" r="1.5"/><circle cx="1080" cy="110" r="1.5"/><circle cx="1160" cy="110" r="1.5"/>
    <circle cx="1240" cy="110" r="1.5"/><circle cx="1320" cy="110" r="1.5"/>
    <circle cx="40" cy="180" r="1.5"/><circle cx="120" cy="180" r="1.5"/><circle cx="200" cy="180" r="1.5"/>
    <circle cx="280" cy="180" r="1.5"/><circle cx="360" cy="180" r="1.5"/><circle cx="440" cy="180" r="1.5"/>
    <circle cx="520" cy="180" r="1.5"/><circle cx="600" cy="180" r="1.5"/><circle cx="680" cy="180" r="1.5"/>
    <circle cx="760" cy="180" r="1.5"/><circle cx="840" cy="180" r="1.5"/><circle cx="920" cy="180" r="1.5"/>
    <circle cx="1000" cy="180" r="1.5"/><circle cx="1080" cy="180" r="1.5"/><circle cx="1160" cy="180" r="1.5"/>
    <circle cx="1240" cy="180" r="1.5"/><circle cx="1320" cy="180" r="1.5"/>
  </g>

  <!-- Flowing curved lines (data streams) -->
  <g stroke="#b45309" stroke-opacity="0.18" stroke-width="1.2" fill="none">
    <path d="M0,80 C200,40 300,140 500,90 C700,40 800,130 1000,80 C1150,40 1250,120 1400,70"/>
    <path d="M0,140 C150,100 350,170 550,120 C750,70 850,160 1050,110 C1200,70 1300,150 1400,120"/>
    <path d="M0,55 C100,80 250,30 450,65 C650,100 750,40 950,60 C1100,75 1280,35 1400,55"/>
  </g>
  <g stroke="#b45309" stroke-opacity="0.08" stroke-width="0.8" fill="none">
    <path d="M0,160 C200,120 350,190 600,150 C800,110 950,175 1200,140 C1280,125 1350,155 1400,140"/>
    <path d="M0,30 C180,55 320,15 520,40 C720,65 870,20 1100,45 C1250,60 1350,30 1400,40"/>
  </g>

  <!-- Glowing accent lines -->
  <g stroke="#f97316" stroke-opacity="0.35" stroke-width="1.5" fill="none" filter="url(#blur-lines)">
    <path d="M0,80 C200,40 300,140 500,90 C700,40 800,130 1000,80 C1150,40 1250,120 1400,70"/>
  </g>

  <!-- Network nodes on the curves -->
  <g fill="#b45309">
    <!-- On first curve -->
    <circle cx="120" cy="68" r="4" fill-opacity="0.5"/>
    <circle cx="340" cy="105" r="5" fill-opacity="0.7"/>
    <circle cx="500" cy="90" r="6" fill-opacity="0.85"/>
    <circle cx="700" cy="58" r="4" fill-opacity="0.5"/>
    <circle cx="900" cy="95" r="5" fill-opacity="0.65"/>
    <circle cx="1100" cy="62" r="4" fill-opacity="0.5"/>
    <circle cx="1280" cy="108" r="5" fill-opacity="0.6"/>
    <!-- On second curve -->
    <circle cx="200" cy="128" r="3.5" fill-opacity="0.45"/>
    <circle cx="450" cy="138" r="4.5" fill-opacity="0.6"/>
    <circle cx="700" cy="98" r="4" fill-opacity="0.5"/>
    <circle cx="950" cy="125" r="5" fill-opacity="0.65"/>
    <circle cx="1180" cy="98" r="4" fill-opacity="0.5"/>
  </g>

  <!-- Glow on key nodes -->
  <g fill="#f97316" filter="url(#blur-dots)">
    <circle cx="500" cy="90" r="10" fill-opacity="0.35"/>
    <circle cx="340" cy="105" r="8" fill-opacity="0.25"/>
    <circle cx="950" cy="125" r="8" fill-opacity="0.25"/>
    <circle cx="700" cy="58" r="7" fill-opacity="0.2"/>
  </g>

  <!-- Connection lines between nodes -->
  <g stroke="#b45309" stroke-opacity="0.15" stroke-width="0.8" fill="none">
    <line x1="340" y1="105" x2="500" y2="90"/>
    <line x1="500" y1="90" x2="700" y2="58"/>
    <line x1="700" y1="58" x2="900" y2="95"/>
    <line x1="450" y1="138" x2="500" y2="90"/>
    <line x1="700" y1="98" x2="700" y2="58"/>
    <line x1="900" y1="95" x2="950" y2="125"/>
  </g>

  <!-- Category label chips (decorative) -->
  <g>
    <rect x="60" y="85" width="70" height="20" rx="10" fill="#b45309" fill-opacity="0.1" stroke="#b45309" stroke-opacity="0.2" stroke-width="1"/>
    <text x="72" y="99" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#b45309" fill-opacity="0.8">Research</text>

    <rect x="260" y="60" width="80" height="20" rx="10" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1"/>
    <text x="272" y="74" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#7c3aed" fill-opacity="0.8">Engineering</text>

    <rect x="560" y="50" width="62" height="20" rx="10" fill="#ca8a04" fill-opacity="0.1" stroke="#ca8a04" stroke-opacity="0.2" stroke-width="1"/>
    <text x="573" y="64" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ca8a04" fill-opacity="0.8">Product</text>

    <rect x="750" y="100" width="70" height="20" rx="10" fill="#be185d" fill-opacity="0.08" stroke="#be185d" stroke-opacity="0.2" stroke-width="1"/>
    <text x="763" y="114" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#be185d" fill-opacity="0.8">Marketing</text>

    <rect x="980" y="65" width="65" height="20" rx="10" fill="#b45309" fill-opacity="0.1" stroke="#b45309" stroke-opacity="0.2" stroke-width="1"/>
    <text x="993" y="79" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#b45309" fill-opacity="0.8">Business</text>

    <rect x="1180" y="90" width="74" height="20" rx="10" fill="#059669" fill-opacity="0.08" stroke="#059669" stroke-opacity="0.2" stroke-width="1"/>
    <text x="1193" y="104" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#059669" fill-opacity="0.8">Operations</text>

    <rect x="1050" y="145" width="50" height="20" rx="10" fill="#4f46e5" fill-opacity="0.08" stroke="#4f46e5" stroke-opacity="0.2" stroke-width="1"/>
    <text x="1063" y="159" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4f46e5" fill-opacity="0.8">Finance</text>
  </g>
</svg>
